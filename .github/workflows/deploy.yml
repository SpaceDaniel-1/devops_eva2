name: Docker CI/CD

on:
  push:
    branches:
      - deploy

jobs:

  backend-despacho:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend despacho
        run: |
          docker build -t danielx1/backend-despacho:v1 ./back-Despachos_SpringBoot

      - name: Push backend despacho
        run: |
          docker push danielx1/backend-despacho:v1


  backend-ventas:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend ventas
        run: |
          docker build -t danielx1/backend-ventas:v1 ./back-Ventas_SpringBoot

      - name: Push backend ventas
        run: |
          docker push danielx1/backend-ventas:v1


  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend
        run: |
          docker build -t danielx1/frontend-despacho:v1 ./front_despacho

      - name: Push frontend
        run: |
          docker push danielx1/frontend-despacho:v1


  deploy-ec2:
    runs-on: ubuntu-latest

    needs:
      - backend-despacho
      - backend-ventas
      - frontend

    steps:
      - name: Desplegar en AWS EC2
        uses: appleboy/ssh-action@v0.1.10

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            # 1. Crear la carpeta si no existe y entrar en ella
            mkdir -p /home/ubuntu/ISY1101_EP2_Proyecto_Semestral
            cd /home/ubuntu/ISY1101_EP2_Proyecto_Semestral
            
            # 2. Descargar el archivo docker-compose.yml directamente desde tu GitHub (rama deploy)
            wget -O docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/deploy/docker-compose.yml
            
            # 3. Descargar las nuevas imágenes y levantar los contenedores
            sudo docker compose pull
            sudo docker compose down # Apaga la versión anterior por si acaso
            sudo docker compose up -d
